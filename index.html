  <script>
    (function(){
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect) {
        sessionStorage.removeItem('spa_redirect');
        try {
          var r = JSON.parse(redirect);
          history.replaceState(null, '', r.path + (r.query||'') + (r.hash||''));
        } catch(e) {}
      }
    })();
  </script>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
