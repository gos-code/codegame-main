<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CodeGame — 코드 자산 거래 플랫폼" />
  <title>CodeGame</title>
  <script>
    (function(){
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect) {
        sessionStorage.removeItem('spa_redirect');
        try {
          var r = JSON.parse(redirect);
          history.replaceState(null, '', r.path + (r.query||'') + (r.hash||''));
        } catch(e) {}
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
